<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabla Periódica 3D Interactiva | Exploración de Elementos</title>
    <meta name="description" content="Explora los 118 elementos de la tabla periódica en 3D. Visualiza en tabla, esfera, hélice y rejilla. Información detallada de cada elemento.">
    <meta name="keywords" content="tabla periódica, elementos químicos, 3D, interactiva, educación, química">
    <meta name="theme-color" content="#0a0a1a">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="container"></div>

    <div id="top-bar">
        <h1 id="title">Tabla Periódica 3D</h1>
        <div id="controls">
            <div id="search-box">
                <svg id="search-icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
                </svg>
                <input type="text" id="search-input" placeholder="Buscar elemento...">
                <button id="search-clear" title="Limpiar búsqueda">&times;</button>
            </div>
            <button id="theme-toggle" class="icon-btn" title="Cambiar tema">
                <svg id="theme-icon-moon" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                </svg>
                <svg id="theme-icon-sun" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
                    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                    <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
                    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
                </svg>
            </button>
        </div>
    </div>

    <nav id="layout-nav">
        <button id="btn-table" class="nav-btn active" data-layout="table">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
            Tabla
        </button>
        <button id="btn-sphere" class="nav-btn" data-layout="sphere">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><ellipse cx="12" cy="12" rx="10" ry="4" transform="rotate(-30 12 12)"/></svg>
            Esfera
        </button>
        <button id="btn-helix" class="nav-btn" data-layout="helix">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 22C4 22 8 16 8 12C8 8 4 2 4 2"/><path d="M20 22C20 22 16 16 16 12C16 8 20 2 20 2"/></svg>
            Hélice
        </button>
        <button id="btn-grid" class="nav-btn" data-layout="grid">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="1" width="6" height="6" rx="1"/><rect x="9" y="1" width="6" height="6" rx="1"/><rect x="17" y="1" width="6" height="6" rx="1"/><rect x="1" y="9" width="6" height="6" rx="1"/><rect x="9" y="9" width="6" height="6" rx="1"/><rect x="17" y="9" width="6" height="6" rx="1"/></svg>
            Rejilla
        </button>
    </nav>

    <div id="element-legend">
        <h3>Categorías</h3>
        <div id="legend-items"></div>
    </div>

    <div id="detail-panel" class="hidden">
        <button id="detail-close" class="icon-btn" title="Cerrar">&times;</button>
        <div id="detail-content"></div>
    </div>

    <div id="loading">
        <div class="loader">
            <div class="loader-ring"></div>
            <span>Cargando elementos...</span>
        </div>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
            "@tweenjs/tween.js": "https://unpkg.com/@tweenjs/tween.js@23.1.1/dist/tween.esm.js"
        }
    }
    </script>
    <script type="module" src="script.js"></script>
</body>
</html>
